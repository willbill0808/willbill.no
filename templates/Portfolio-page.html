<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ doc_name }}</title>
    <link rel="icon" type="image/png" href="/static/favicon.png">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="/static/portfolio.css">
</head>

<body>

    <div class="container">

        <!-- Sidebar -->
        <nav class="sidebar">
            <h2>Menu</h2>

            {% for item in nav_items %}
                <a class="nav-link" id="{{ item.id }}" href="{{ item.url }}">
                    {{ item.name }}
                </a>
            {% endfor %}
        </nav>

        <!-- Main Content -->
        <main class="content">
            <div class="page-hero">
                <h1>{{ dis_name }}</h1>
                <p>View your portfolio pages and keep track of your projects with a modern, polished experience.</p>
            </div>

        </main>

    </div>

</body>

</html>
