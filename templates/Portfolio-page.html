<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ doc_name }}</title>
    <link rel="icon" type="image/png" href="/static/favicon.png">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="/static/portfolio.css">
</head>

<body>

    <div class="container">

        <!-- Sidebar -->
        <nav class="sidebar">
            <h2>Menu</h2>

            {% for item in nav_items %}
            <a href="{{ item.url }}">
                <button id="{{ item.id }}">{{ item.name }}</button>
            </a>
            {% endfor %}
        </nav>

        <!-- Main Content -->
        <main class="content">
            <h1>{{ dis_name }}</h1>


        </main>

    </div>

</body>

</html>
