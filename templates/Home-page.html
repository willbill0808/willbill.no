<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ doc_name }}</title>
    <link rel="icon" type="image/png" href="/static/favicon.png">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="/static/home.css">
</head>
<body>

<div class="container">

    <!-- Sidebar -->
    <nav class="sidebar">
        <h2>Menu</h2>

        {% for item in nav_items %}
            <a class="nav-link" id="{{ item.id }}" href="{{ item.url }}">
                {{ item.name }}
            </a>
        {% endfor %}
    </nav>

    <!-- Main Content -->
    <main class="content">
        <div class="page-hero">
            <h1>{{ dis_name }}</h1>
            <p>Welcome to your personal portal. Explore the site navigation on the left to access services, account controls, and more.</p>
        </div>

    </main>

</div>

</body>
</html>
